name: Check marketing-skills release

# Polls coreyhaines31/marketingskills daily. When the library version changes,
# regenerates the overview (version badges + what's-new banner + skill grid),
# commits it (which triggers a Vercel redeploy), and sends a Telegram notification.

on:
  schedule:
    # Two daily triggers for redundancy — GitHub often fires cron 30-90+ min
    # late or skips a run under load. update-doc.mjs dedupes on the Central
    # calendar date, so exactly one run per CT day actually updates the page.
    - cron: '0 22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a rebuild + test notification even if the version is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: check-marketing-skills
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Check for a new marketing-skills version
        id: check
        run: node scripts/update-doc.mjs ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Assemble index.html from the shared kit
        if: steps.check.outputs.skipped != 'true'
        run: node kit/build/assemble.mjs

      - name: Commit & push updated overview
        if: steps.check.outputs.skipped != 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
          CHANGED: ${{ steps.check.outputs.changed }}
        run: |
          git config user.name "marketing-skills-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html version.json data/skills.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            if [ "$CHANGED" = "true" ]; then
              MSG="chore: marketing-skills v${VERSION}"
            else
              MSG="chore: checked marketing-skills ($(TZ=America/Chicago date '+%Y-%m-%d %H:%M %Z'))"
            fi
            git commit -m "$MSG"
            git push
          fi

      - name: Notify Telegram
        if: steps.check.outputs.changed == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_THREAD: ${{ secrets.TELEGRAM_THREAD_IMPORTANT }}
          VERSION: ${{ steps.check.outputs.version }}
          HEADLINE: ${{ steps.check.outputs.headline }}
        run: |
          MSG="🚀 marketing-skills v${VERSION} updated

          ${HEADLINE}

          Updated overview → https://marskills.vercel.app"
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "message_thread_id=${TG_THREAD}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=false" \
            -o /tmp/tg.json -w "Telegram HTTP %{http_code}\n"
          if ! grep -q '"ok":true' /tmp/tg.json; then
            echo "Telegram send failed:"; cat /tmp/tg.json; exit 1
          fi
